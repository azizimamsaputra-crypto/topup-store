<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>JamkosStore - Top-Up Store</title>\n    <style>\n        body {\n            background-color: #121212;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .container {\n            max-width: 600px;\n            margin: auto;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);\n        }\n        h1 {\n            text-align: center;\n        }\n        select, input {\n            width: 100%;\n            padding: 10px;\n            margin: 10px 0;\n            border: none;\n            border-radius: 4px;\n        }\n        button {\n            background-color: #ff4081;\n            color: white;\n            border: none;\n            padding: 15px;\n            border-radius: 4px;\n            cursor: pointer;\n            font-size: 16px;\n        }\n        button:hover {\n            background-color: #f50057;\n        }\n    </style>\n</head>\n<body>\n    <div class='container'>\n        <h1>JamkosStore - Top-Up Store</h1>\n        <label for='game'>Select Game:</label>\n        <select id='game'>\n            <option value='free-fire'>Free Fire</option>\n            <option value='mobile-legends'>Mobile Legends</option>\n        </select>\n        <label for='player-id'>Player ID:</label>\n        <input type='text' id='player-id' placeholder='Enter your Player ID' required>\n        <label for='diamond-nominal'>Diamond Nominal:</label>\n        <select id='diamond-nominal'>\n            <option value='100'>100 Diamonds</option>\n            <option value='300'>300 Diamonds</option>\n            <option value='500'>500 Diamonds</option>\n            <option value='1000'>1000 Diamonds</option>\n        </select>\n        <label for='payment-method'>Payment Method:</label>\n        <select id='payment-method'>\n            <option value='dana'>Dana</option>\n            <option value='ovo'>OVO</option>\n            <option value='gopay'>GoPay</option>\n        </select>\n        <button type='button' id='top-up-button'>Top Up</button>\n    </div>\n</body>\n</html>
